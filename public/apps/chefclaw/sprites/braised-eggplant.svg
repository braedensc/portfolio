  <g transform="translate(96 100) rotate(-16) scale(.84)">
    <path d="M0 6 Q4 -4 22 -4 Q44 -4 48 6 Q44 16 22 16 Q4 16 0 6 Z" fill="url(#begskin)" stroke="#2a1226" stroke-width="1.3"/>
    <path d="M6 6 Q10 -1 22 -1 Q38 -1 42 6 Q38 12 22 12 Q10 12 6 6 Z" fill="url(#begflesh)" opacity=".9"/>
  </g>
  <g transform="translate(178 100) rotate(12) scale(.84)">
