<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="begBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="begbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#123138"/><stop offset="45%" stop-color="#0b090a"/><stop offset="100%" stop-color="#060506"/>
    </radialGradient>
    <radialGradient id="begsauce" cx="46%" cy="34%" r="80%">
      <stop offset="0%" stop-color="#9c2b10"/><stop offset="55%" stop-color="#661408"/><stop offset="100%" stop-color="#3b0b05"/>
    </radialGradient>
    <linearGradient id="begskin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7a3a4e"/><stop offset="50%" stop-color="#5c2c52"/><stop offset="100%" stop-color="#3f1c3a"/>
    </linearGradient>
    <linearGradient id="begflesh" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c98a4e"/><stop offset="100%" stop-color="#96502a"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#begbg)"/>
  <!-- rising steam wisps -->
  <path d="M120 54 C110 36 130 30 120 10" stroke="#fff" stroke-width="7" fill="none" opacity=".1" filter="url(#begBlur3)"/>
  <path d="M200 52 C192 36 210 28 202 8" stroke="#fff" stroke-width="6" fill="none" opacity=".08" filter="url(#begBlur3)"/>
  <!-- cast shadow -->
  <ellipse cx="160" cy="188" rx="152" ry="22" fill="#000" opacity=".5"/>
