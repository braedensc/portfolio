    <path d="M6 6 Q10 -1 22 -1 Q38 -1 42 6 Q38 12 22 12 Q10 12 6 6 Z" fill="url(#begflesh)" opacity=".9"/>
  </g>
  <!-- front row (larger, glossy) -->
  <g transform="translate(78 116) rotate(-8)">
    <path d="M0 8 Q5 -5 28 -5 Q56 -5 62 8 Q56 21 28 21 Q5 21 0 8 Z" fill="url(#begskin)" stroke="#2a1226" stroke-width="1.4"/>
    <path d="M8 8 Q13 -1 28 -1 Q49 -1 55 8 Q49 16 28 16 Q13 16 8 8 Z" fill="url(#begflesh)"/>
    <ellipse cx="24" cy="4" rx="11" ry="3" fill="#e0a866" opacity=".6"/>
    <circle cx="14" cy="9" r="1.5" fill="#fff" opacity=".55"/>
  </g>
  <g transform="translate(158 120) rotate(10)">
    <path d="M0 8 Q5 -5 28 -5 Q56 -5 62 8 Q56 21 28 21 Q5 21 0 8 Z" fill="url(#begskin)" stroke="#2a1226" stroke-width="1.4"/>
    <path d="M8 8 Q13 -1 28 -1 Q49 -1 55 8 Q49 16 28 16 Q13 16 8 8 Z" fill="url(#begflesh)"/>
    <ellipse cx="24" cy="4" rx="11" ry="3" fill="#e0a866" opacity=".6"/>
    <circle cx="42" cy="10" r="1.5" fill="#fff" opacity=".55"/>
  </g>
  <g transform="translate(122 128) rotate(-2)">
    <path d="M0 7 Q4 -4 24 -4 Q48 -4 53 7 Q48 18 24 18 Q4 18 0 7 Z" fill="url(#begskin)" stroke="#2a1226" stroke-width="1.4"/>
    <path d="M7 7 Q11 0 24 0 Q42 0 47 7 Q42 14 24 14 Q11 14 7 7 Z" fill="url(#begflesh)"/>
    <ellipse cx="21" cy="3" rx="9" ry="2.6" fill="#e0a866" opacity=".55"/>
  </g>
  <!-- minced garlic + diced red chili + scallion garnish -->
  <circle cx="104" cy="118" r="2" fill="#f2ddb0"/>
  <circle cx="190" cy="118" r="2" fill="#f2ddb0"/>
  <circle cx="146" cy="112" r="1.8" fill="#f2ddb0"/>
  <path d="M170 116 l9 3" stroke="#e0341f" stroke-width="3" stroke-linecap="round"/>
  <path d="M116 124 l-9 3" stroke="#e0341f" stroke-width="3" stroke-linecap="round"/>
  <rect x="150" y="122" width="8" height="2.8" rx="1.4" fill="#5ecb4e" transform="rotate(-14 154 123)"/>
  <rect x="132" y="134" width="7" height="2.6" rx="1.3" fill="#3f9c37" transform="rotate(20 135 135)"/>
  <rect x="196" y="128" width="7" height="2.6" rx="1.3" fill="#58c14a" transform="rotate(-18 199 129)"/>
