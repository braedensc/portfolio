  <ellipse cx="130" cy="122" rx="20" ry="6" fill="#c2451f" opacity=".5"/>
  <ellipse cx="196" cy="126" rx="16" ry="5" fill="#c2451f" opacity=".4"/>
  <!-- eggplant batons: purple-skinned wedges, cut flesh showing, tossed -->
