<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <filter id="crBlur3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="crbg" cx="85%" cy="-5%" r="100%">
      <stop offset="0%" stop-color="#332818"/><stop offset="45%" stop-color="#0b0a08"/><stop offset="100%" stop-color="#060606"/>
    </radialGradient>
    <radialGradient id="crboard" cx="50%" cy="30%" r="82%">
      <stop offset="0%" stop-color="#241a12"/><stop offset="100%" stop-color="#100b08"/>
    </radialGradient>
    <linearGradient id="crbody" x1="0" y1="0" x2="0.2" y2="1">
      <stop offset="0%" stop-color="#f2c877"/><stop offset="45%" stop-color="#d99a44"/><stop offset="100%" stop-color="#a8641f"/>
    </linearGradient>
    <linearGradient id="crlobe" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f6d488"/><stop offset="100%" stop-color="#c17f2e"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#crbg)"/>
  <!-- steam wisps -->
  <path d="M118 52 C108 36 128 28 118 10" stroke="#fff" stroke-width="7" fill="none" opacity=".08" filter="url(#crBlur3)"/>
  <path d="M206 54 C198 38 216 30 208 12" stroke="#fff" stroke-width="6" fill="none" opacity=".07" filter="url(#crBlur3)"/>
  <ellipse cx="160" cy="186" rx="152" ry="22" fill="#000" opacity=".5"/>
  <!-- wooden serving board -->
  <ellipse cx="160" cy="140" rx="140" ry="40" fill="url(#crboard)"/>
  <ellipse cx="160" cy="140" rx="140" ry="40" fill="none" stroke="#3a2a1a" stroke-width="3"/>
  <path d="M40 132 Q160 118 280 132" stroke="#4a3620" stroke-width="1.4" fill="none" opacity=".5"/>
  <path d="M46 150 Q160 138 274 150" stroke="#3a2a18" stroke-width="1.4" fill="none" opacity=".5"/>
  <!-- neon steam arc (warm/local white) -->
  <path d="M52 120 Q104 90 168 88" stroke="#ffe9c9" stroke-width="2.5" fill="none" opacity=".42" stroke-linecap="round"/>
  <!-- CROISSANT: crescent with curled end lobes -->
  <g>
    <!-- main crescent body -->
    <path d="M78 120
             C74 92 108 78 160 78
             C212 78 246 92 242 120
             C238 108 208 100 160 100
             C112 100 82 108 78 120 Z" fill="url(#crbody)"/>
    <!-- underbelly rounder crescent to give volume -->
    <path d="M84 118 C90 100 120 92 160 92 C200 92 230 100 236 118
             C224 132 196 138 160 138 C124 138 96 132 84 118 Z" fill="url(#crbody)"/>
    <!-- curled tip lobes (left) -->
    <path d="M66 112 C58 104 62 92 74 90 C82 96 84 108 78 118 Z" fill="url(#crlobe)" stroke="#9c5a1c" stroke-width="1.1"/>
    <!-- curled tip lobes (right) -->
    <path d="M254 112 C262 104 258 92 246 90 C238 96 236 108 242 118 Z" fill="url(#crlobe)" stroke="#9c5a1c" stroke-width="1.1"/>
    <!-- flaky diagonal lamination ridges across the roll -->
    <g stroke="#a8641f" stroke-width="1.6" fill="none" opacity=".7" stroke-linecap="round">
      <path d="M104 96 C100 108 104 120 112 130"/>
      <path d="M126 92 C122 106 126 120 134 132"/>
      <path d="M150 90 C146 104 150 120 156 134"/>
      <path d="M174 90 C170 104 174 120 180 134"/>
      <path d="M198 92 C194 106 198 118 204 130"/>
      <path d="M218 96 C214 108 218 118 224 128"/>
    </g>
    <!-- lit ridge highlights (buttery sheen) -->
    <g stroke="#ffe7ad" stroke-width="1.4" fill="none" opacity=".65" stroke-linecap="round">
      <path d="M114 94 C110 106 114 116 120 126"/>
      <path d="M162 88 C158 102 162 116 166 128"/>
      <path d="M206 94 C202 106 206 116 210 124"/>
    </g>
    <!-- glossy egg-wash sheen along the top arc -->
    <path d="M92 104 C120 90 200 90 228 104" stroke="#fff0cf" stroke-width="2.4" fill="none" opacity=".5" stroke-linecap="round"/>
    <!-- outline -->
    <path d="M78 120 C74 92 108 78 160 78 C212 78 246 92 242 120" stroke="#8a4d16" stroke-width="1.4" fill="none" opacity=".55"/>
  </g>
  <!-- scattered flaky crumbs on the board -->
  <path d="M96 150 l6 -2" stroke="#e0a94e" stroke-width="2.2" stroke-linecap="round"/>
  <path d="M214 150 l6 2" stroke="#e0a94e" stroke-width="2.2" stroke-linecap="round"/>
  <circle cx="130" cy="152" r="1.6" fill="#d99a44"/>
  <circle cx="188" cy="152" r="1.6" fill="#d99a44"/>
  <!-- butter-sheen gloss dots -->
  <circle cx="120" cy="100" r="1.4" fill="#fff" opacity=".6"/>
  <circle cx="182" cy="96" r="1.3" fill="#fff" opacity=".55"/>
  <circle cx="214" cy="106" r="1.2" fill="#fff" opacity=".5"/>
</svg>
