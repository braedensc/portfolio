# Dependabot — automated dependency update PRs.
# Security alerts/updates are enabled separately in repo settings (Security tab);
# this file governs scheduled *version* updates. Docs:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates
version: 2
updates:
  # npm app dependencies (Next.js, React, tooling)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    groups:
      # Batch minor/patch bumps into one PR to cut review noise.
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    # Hold back majors that need a deliberate, hands-on migration — Dependabot
    # keeps proposing minor/patch bumps for these, just not the major jump.
    ignore:
      # TypeScript 7 is the native-compiler rewrite; stay on 5.x until we migrate.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      # ESLint 10 needs a flat-config/rule migration; stay on 9.x for now.
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]

  # Keep GitHub Actions (checkout, setup-node, …) pinned and current.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "github-actions"
